<app-navbar></app-navbar>
      
       <div class=" min-h-full flex-col items-center justify-center px-6 py-12 lg:px-8 bg-gray-200"> 
      <div class="sm:mx-auto sm:w-full sm:max-w-sm">
        <img class="mx-auto h-24 w-auto" src="https://t4.ftcdn.net/jpg/04/37/93/35/360_F_437933537_pvIQ4hmbnvyT3lIMscN9kg0m0TabSOJ8.jpg" alt="Your Company"/>
        <h2 class="mt-4 text-center text-2xl font-bold leading-9 tracking-tight text-gray-900">Create an Account</h2>
      </div>
  
      <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm ">
        <form #signup="ngForm" (ngSubmit)="signUp(signup.value)" class="space-y-6" action="#" method="POST">
          <div>
            <label For="fullname" class="block text-sm font-medium leading-6 text-gray-900">Full Name<span class="required-asterisk">*</span></label>
            <div class="mt-2">
              <input id="fullname" name="fullname" ngModel type="text" placeholder="Enter your full name (e.g., John Doe)" required class=" px-2 block w-full rounded-md border-1 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-600 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-black sm:text-sm sm:leading-6"/>
            </div>
          </div>
  
          <div>
            <label For="email" class="block text-sm font-medium leading-6 text-gray-900">Email Adress<span class="required-asterisk">*</span></label>
            <div class="mt-2">
              <input id="email" name="email" ngModel type="email" placeholder="Enter your email address (e.g., john.doe@example.com)" required class="px-2 block w-full rounded-md border-1 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-600 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-black sm:text-sm sm:leading-6"/>
            </div>
          </div>
  
          <div>
            <label html="phone" class="block text-sm font-medium leading-6 text-gray-900">Phone Number<span class="required-asterisk">*</span></label>
            <div class="mt-2">
              <input id="phone" name="phoneno" type="tel" ngModel placeholder="Enter your phone number (e.g., 0307 6374736)" required class="px-2 block w-full rounded-md border-1 py-1.5  text-gray-900 shadow-sm ring-1 ring-inset ring-gray-600 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-black sm:text-sm sm:leading-6"/>
            </div>
          </div>
  
          <div>
            <label html="password" class="block text-sm font-medium leading-6 text-gray-900">Password<span class="required-asterisk">*</span></label>
            <div class="mt-2">
              <input id="password" name="password" type="password" ngModel placeholder="Create a strong password " required class="px-2 block w-full rounded-md border-1 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-600 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-black sm:text-sm sm:leading-6"/>
            </div>
          </div>

          <div>
            <label html="password" class="block text-sm font-medium leading-6 text-gray-900">Re-type Password<span class="required-asterisk">*</span></label>
            <div class="mt-2">
              <input id="password" name="password" type="password" ngModel placeholder="Re-type your password " required class="px-2 block w-full rounded-md border-1 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-600 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-black sm:text-sm sm:leading-6"/>
            </div>
          </div>
  
  
          <div class="flex  items-center">

           <app-button
            label="Join as Contractor"
            styleType="simple"
            (onClick)="navigateToContractorform()"
            class="flex w-full justify-center rounded-md bg-black mr-1 py-1.5 text-sm font-semibold leading-6 text-white shadow-sm hover:bg-black focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-black"></app-button>
            <app-button class="flex ml-1 w-full justify-center rounded-md bg-black px-3 py-1.5 text-sm font-semibold leading-6 text-white shadow-sm hover:bg-black focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-black"
            label="Join as Client"
            styleType="simple"
            (onClick)="navigateToClientform()"
            ></app-button>
          </div>
      
          </form>
          <p class="mt-10 text-center text-sm text-gray-500">
          I'm already a member!
          <a href="/login" class="font-semibold leading-6 text-black hover:text-black"> Sign in</a>
        </p>
          </div>

        </div>
    

        
      

<app-footer></app-footer>
<router-outlet></router-outlet>
