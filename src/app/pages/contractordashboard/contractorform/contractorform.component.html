
<app-contractor-navbar></app-contractor-navbar>

<div class="container-fluid ">
    <div class="row">
        <div class="bg-image">
            <div class="up-text">
                <p>Contractor Information Form </p>
            </div>
        </div>
    </div>
    <div class="row">


        <div class="container col-md-6 ">
            
            <form>
                <div class="row ">


                    <div class="form-group mt-2 ">
                        <label for="companyName">Company Name</label>
                        <input type="text" class="form-control" id="companyName" placeholder="Enter company name" required>
                    </div>
            
                    <!-- Price with Material -->
                    <div class="form-group">
                        <label for="priceWithMaterial">Price with Material</label>
                        <input type="number" class="form-control" id="priceWithMaterial" placeholder="Enter price with material" required>
                    </div>
            
                </div>
                <!-- Company Name -->
                <!-- Price without Material -->
                <div class="form-group">
                    <label for="priceWithoutMaterial">Price without Material</label>
                    <input type="number" class="form-control" id="priceWithoutMaterial" placeholder="Enter price without material" required>
                </div>
        
                <!-- Phone Number -->
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" class="form-control" id="phoneNumber" placeholder="Enter phone number" required>
                </div>
        
                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter email" required>
                </div>
        
                <!-- Office Address -->
                <div class="form-group">
                    <label for="officeAddress">Office Address</label>
                    <input type="text" class="form-control" id="officeAddress" placeholder="Enter office address" required>
                </div>
        
                <!-- Company Profile Picture -->
                <div class="form-group">
                    <label for="companyProfilePicture">Company Profile Picture</label><br>
                    <input type="file" class="form-control-file" id="companyProfilePicture" required>
                </div>
        
                <!-- Location (Dropdown) -->
                <div class="form-group">
                    <label for="location">Location</label>
                    <select class="form-control" id="location" required>
                        <option value="" disabled selected>Select location</option>
                        <option value="lahore">Lahore</option>
                        <option value="islamabad">Islamabad</option>
                        <option value="karachi">Karachi</option>
                    </select>
                </div>
        
                <!-- Description -->
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea class="form-control" id="description" rows="4" placeholder="Enter description" required></textarea>
                </div>
        
                <!-- Submit Button -->
                 <div class="d-flex justify-content-center ">
                     <app-button styleType="simple" label="Submit" (onClick)="navigateToContractordashboard()" class="mb-2 px-2"></app-button>

                 </div>
            </form>
        </div>
        
    </div>
</div>
<app-footer></app-footer>

<router-outlet></router-outlet>
